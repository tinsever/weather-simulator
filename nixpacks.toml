[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo_sqlite", "composer", "sqlite"]

[phases.build]
cmds = [
  "mkdir -p database",
  "[ -f database/clauswetter.db ] || touch database/clauswetter.db",
  "chmod -R 775 database || true",
  "composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist"
]

[start]
cmd = "bash /assets/start.sh"

[staticAssets]
"start.sh" = '''
#!/usr/bin/env bash
set -euo pipefail

db_path="${DB_PATH:-/app/database/clauswetter.db}"
db_dir="$(dirname "$db_path")"
mkdir -p "$db_dir" >/dev/null 2>&1 || true

php -d variables_order=EGPCS scripts/bootstrap.php
exec php -d variables_order=EGPCS -S 0.0.0.0:${PORT:-8080} -t . index.php
'''
