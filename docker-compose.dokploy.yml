services:
  app:
    build:
      context: .
      target: app
    restart: unless-stopped
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CRON_SECRET: ${CRON_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Vaduz}
      DB_PATH: ${DB_PATH:-/app/database/clauswetter.db}
    expose:
      - "9000"
    volumes:
      - app_database:/app/database

  web:
    build:
      context: .
      target: web
    restart: unless-stopped
    depends_on:
      - app
    expose:
      - "80"

volumes:
  app_database:
